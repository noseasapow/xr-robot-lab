<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Robot Superficie</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>

<a-scene
  xr-mode-ui="enterAREnabled: true"
  renderer="antialias: true"
  device-orientation-permission-ui="enabled: true"
  webxr="requiredFeatures: hit-test">

  <!-- Cámara -->
  <a-camera></a-camera>

  <!-- Cursor para colocar -->
  <a-entity 
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable">
  </a-entity>

  <!-- Robot -->
  <a-entity
    id="robot"
    class="clickable"
    gltf-model="robot.glb"
    position="0 0 -2"
    scale="0.2 0.2 0.2"
    visible="false">
  </a-entity>

</a-scene>

<script>
AFRAME.registerComponent('colocar', {
  init: function () {
    const scene = document.querySelector('a-scene');
    const robot = document.querySelector('#robot');

    scene.addEventListener('click', () => {
      robot.setAttribute('visible', true);
      robot.setAttribute('position', '0 0 -1');
    });
  }
});

document.querySelector('a-scene').setAttribute('colocar', '');
</script>

</body>
</html>
