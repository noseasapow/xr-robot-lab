<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba modelo CAD en A-Frame</title>
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('activar-sombras-modelo', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const obj = this.el.getObject3D('mesh');
          if (!obj) return;

          obj.traverse((node) => {
            if (node.isMesh) {
              node.castShadow = true;
              node.receiveShadow = true;
              if (node.material) {
                node.material.needsUpdate = true;
              }
            }
          });
        });
      }
    });
  </script>
</head>
<body>
  <a-scene renderer="antialias: true; shadowMapEnabled: true" vr-mode-ui="enabled: true">

    <!-- Luz ambiental -->
    <a-light type="ambient" intensity="0.45"></a-light>

    <!-- Luz direccional con sombra -->
    <a-light
      type="directional"
      position="4 8 4"
      intensity="1.2"
      cast-shadow="true"
      shadow-map-width="2048"
      shadow-map-height="2048"
      shadow-camera-left="-20"
      shadow-camera-right="20"
      shadow-camera-bottom="-20"
      shadow-camera-top="20"
      shadow-camera-near="1"
      shadow-camera-far="30"
      target="#robot">
    </a-light>

    <!-- Cámara -->
    <a-entity position="0 1.6 8">
      <a-camera wasd-controls look-controls></a-camera>
    </a-entity>

    <!-- Piso -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#6e6e6e"
      shadow="receive: true">
    </a-plane>

    <!-- Pared trasera -->
    <a-plane
      position="0 5 -12"
      width="30"
      height="10"
      color="#3a3a3a">
    </a-plane>

    <!-- Pared izquierda -->
    <a-plane
      position="-15 5 0"
      rotation="0 90 0"
      width="24"
      height="10"
      color="#3a3a3a">
    </a-plane>

    <!-- Pared derecha -->
    <a-plane
      position="15 5 0"
      rotation="0 -90 0"
      width="24"
      height="10"
      color="#3a3a3a">
    </a-plane>

    <!-- Techo -->
    <a-plane
      position="0 10 0"
      rotation="90 0 0"
      width="30"
      height="30"
      color="#2a2a2a">
    </a-plane>

    <!-- Fondo -->
    <a-sky color="#2b2b2b"></a-sky>

    <!-- Elementos laterales -->
    <a-box
      position="3 1 -3"
      width="1"
      height="2"
      depth="1"
      color="#555555"
      shadow="cast: true; receive: true">
    </a-box>

    <a-box
      position="-3 1 -4"
      width="1"
      height="2"
      depth="1"
      color="#555555"
      shadow="cast: true; receive: true">
    </a-box>

    <!-- Modelo CAD -->
    <a-entity
      gltf-model="robot.glb"
      position="1 -4 4"
      rotation="-10 45 0"
      scale="1.5 1.5 1.5"
      shadow="cast: true">
    </a-entity>

  </a-scene>
</body>
</html>
